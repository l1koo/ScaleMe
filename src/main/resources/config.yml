# Настройка лимитов. Пермишен будет выдаваться в формате scaleme.limit.<название>
# Например: scaleme.limit.default или scaleme.limit.vip
limits:
  default:
    min: 0.5
    max: 2.0
  vip:
    min: 0.25
    max: 5.0
  vip_plus:
    min: 0.1
    max: 10.0

# Сообщения плагина
messages:
  no_permission: "&cУ вас нет прав на использование этой команды!"
  invalid_number: "&cПожалуйста, введите корректное число! (Например: 1.5)"
  out_of_bounds: "&cВаш размер должен быть от &e%min% &cдо &e%max%&c!"
  scale_set_self: "&aВаш размер изменен на &e%size%"
  scale_set_other: "&aРазмер игрока &e%player% &aизменен на &e%size%"
  scale_received: "&aАдминистратор изменил ваш размер на &e%size%"
  player_not_found: "&cИгрок не найден!"
  reloaded: "&aКонфигурация ScaleMe успешно перезагружена!"
  usage: "&eИспользование: /scale <размер> [игрок] или /scale reload"